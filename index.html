<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Personīgais finanšu pārvaldnieks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>

<body>

  <header>
    <h1>Finanšu pārvaldnieks</h1>
    <button id="darkModeToggle">🌙</button>
  </header>

  <main>

    <!-- Card: Pievienot ierakstu -->
    <div class="card">
      <h2>Pievienot ierakstu</h2>

      <input id="amount" type="number" placeholder="Summa (€)">
      <input id="desc" type="text" placeholder="Apraksts">

      <select id="type">
        <option value="income">Ienākums</option>
        <option value="expense">Izdevums</option>
      </select>

      <select id="categorySelect"></select>

      <input id="newCategory" type="text" placeholder="Jauna kategorija">
      <button id="addCategoryBtn">Pievienot kategoriju</button>

      <button id="addBtn">Pievienot ierakstu</button>
    </div>

    <!-- Card: Filtri -->
    <div class="card">
      <h2>Filtri un meklēšana</h2>

      <select id="filterType">
        <option value="all">Visi tipi</option>
        <option value="income">Ienākumi</option>
        <option value="expense">Izdevumi</option>
      </select>

      <select id="filterCategory">
        <option value="all">Visas kategorijas</option>
      </select>

      <input id="searchInput" type="text" placeholder="Meklēt pēc apraksta">
    </div>

    <!-- Card: Budžeta mērķi -->
    <div class="card">
      <h2>Budžeta mērķi</h2>

      <select id="budgetCategorySelect"></select>
      <input id="budgetLimit" type="number" placeholder="Budžeta limits (€)">
      <button id="addBudgetBtn">Pievienot budžetu</button>
